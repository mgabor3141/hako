name: checks

# Cross-cutting validation, on every push/PR (all jobs are fast):
#   - shellcheck the load-bearing shell (the approval gate, sealed boot, the
#     bootstrap, ...);
#   - run the skill contract tests (hermetic, no credentials);
#   - secret-scan the full git history -- "ships no secrets" is a core invariant
#     (ADR-0002).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pinned image so CI matches local runs (apt's version drifts)
      - run: |
          docker run --rm -v "$PWD:/mnt:ro" -w /mnt koalaman/shellcheck:v0.10.0 \
            hako $(find gateway container integrations -name '*.sh')

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: contract tests
        run: |
          shopt -s nullglob
          for t in integrations/*/skill/test.ts; do
            echo "== $t"
            ( cd "$(dirname "$t")" && bun test.ts )
          done

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the git-mode scan
      - name: gitleaks (full history)
        run: |
          v=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${v}/gitleaks_${v}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --redact
