# Builds the hako launcher (launcher/) into pinned, checksummed release binaries.
# The repo-root ./hako bootstrap downloads the matching archive for the host and
# verifies its sha256 against the committed launcher/checksums.txt (ADR-0008/0012).
#
#   git tag v0.1.0 && git push origin v0.1.0   # CI runs goreleaser
#   # then commit the pin: launcher/HAKO_VERSION + launcher/checksums.txt
version: 2
project_name: hako

builds:
  - id: hako
    dir: launcher        # the launcher is its own Go module
    main: .
    binary: hako
    env: [CGO_ENABLED=0]
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{ .Version }}"
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: hako
    # version-independent name so the bootstrap URL is just <tag>/<asset>
    name_template: "hako_{{ .Os }}_{{ .Arch }}"
    files: [LICENSE]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: mgabor3141
    name: hako
