# hako's curated dev toolchain. mise installs these into the mounted home
# (~/.local/share/mise) at container start, pinned to exact versions and
# checksums by mise.lock next to this file.
#
# This file is git-tracked: edits surface as diffs on `git pull` (opinions,
# not silent clobbers). To bump versions deliberately: `mise upgrade` then
# commit the mise.lock change.

[tools]
# runtimes (node is kept as a general tool; pi itself runs under bun, below)
node   = "22"
bun    = "latest"
# On install, mise also pip-installs the pinned libs in ~/.default-python-packages
# (python-docx / openpyxl / python-pptx, for the office skill).
python = "3.12"

# CLI toolchain (aqua-backed: GitHub releases + checksums)
eza        = "latest"
bat        = "latest"
ripgrep    = "latest"
fd         = "latest"
fzf        = "latest"
jq         = "latest"
shellcheck = "latest"
zoxide     = "latest"
jj         = "latest"
starship   = "latest"

# pi, the coding agent (npm backend, installed AND run with bun). pi ships a
# `#!/usr/bin/env node` shebang; the postinstall flips it to bun so the mise
# shim runs pi under bun. Update from inside the container with:
#   mise use -g "npm:@earendil-works/pi-coding-agent@<version>"
# which rewrites this file + the lock, persists in the home, shows as a git diff.
[tools."npm:@earendil-works/pi-coding-agent"]
version = "latest"
depends = ["bun"]
postinstall = '''
f="$(readlink -f "$MISE_TOOL_INSTALL_PATH/bin/pi")"
sed -i '1s|.*|#!/usr/bin/env bun|' "$f"
'''

# pi-acp: the ACP (Agent Client Protocol) adapter. Lets an external editor (e.g.
# Zed) drive the sandboxed pi over `docker exec -i hako pi-acp` -- pi-acp speaks
# ACP/stdio to the editor and spawns `pi --mode rpc` in here. Runs under node
# (its shipped shebang), so no shebang flip. Off the hot path: only spawned when
# an editor connects. See docs/acp.md. Bump like pi: `mise use -g npm:pi-acp@<v>`.
[tools."npm:pi-acp"]
version = "latest"
depends = ["node"]

[settings]
# Record exact versions + checksums in mise.lock and install --locked.
lockfile = true

[settings.npm]
# Install npm-backed tools (pi) with bun for speed. (mise handles project env
# itself, so we don't ship direnv.)
package_manager = "bun"
