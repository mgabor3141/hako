# hako — Phase 1: one opinionated pi agent in a hermetic container.
#
# A single bind mount: the clone's agent/ becomes the agent's entire home.
# The OS image is thin and pinned; the dev toolchain (node, bun, pi, CLI tools)
# is installed into the home by mise on first start. No host ~/.pi is touched,
# and no credentials live here; pi brings its own auth.

services:
  hako:
    build: ./container
    container_name: hako
    restart: unless-stopped
    volumes:
      - ./agent:/home/agent
      # the integration catalog, mounted read-only so enabled skills can be
      # symlinked into pi's dir live (ADR-0014).
      - ./integrations:/opt/hako/integrations:ro
    # generated by `hako assemble` from enabled integrations' settings
    # (HAKO_<INT>_<SETTING>); optional so non-up commands don't require it.
    env_file:
      - path: .hako.env
        required: false
    environment:
      # gmuxd binds 127.0.0.1 by default; inside a container it must listen on
      # all interfaces so the published port can reach it. TCP still requires
      # gmux's bearer token, and the port below is published only to this
      # machine's loopback.
      GMUXD_LISTEN: "0.0.0.0"
      # The human's interactive shell (gmux web terminal + `exec`). pi ignores
      # this and always runs /bin/bash, so agent-suggested commands stay bash.
      SHELL: /usr/bin/zsh
    ports:
      # gmux web UI — reachable only from this machine's browser (localhost).
      # Host port is 8791 (not gmux's default 8790) so a gmux running on the
      # host can coexist; gmuxd still listens on 8790 inside the container.
      # Remote/phone access is a deliberate opt-in via gmux's Tailscale listener.
      - "127.0.0.1:8791:8790"
    healthcheck:
      # gmuxd answers / with a 303 -> /auth/login; curl -f treats 3xx as success.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8790/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
