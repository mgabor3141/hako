# hako — Phase 1: one opinionated pi agent in a hermetic container.
#
# A single bind mount: the clone's home/ becomes the agent's entire home.
# Everything hako needs (tools, pi, bun) is baked outside the home, so the
# mount shadows nothing. No host ~/.pi is touched. No credentials here — pi
# brings its own auth.

services:
  hako:
    build: ./container
    container_name: hako
    restart: unless-stopped
    volumes:
      - ./home:/home/agent
    # gmux web UI port comes with the connectivity layer (Phase 1.5).
