# Phase-2 overlay: the MCP gateway — a credential-holding proxy that fronts
# remote MCP servers and gates chosen tool calls behind callHook (ADR-0007/0010).
#
#   docker compose -f compose.yaml -f gateway/compose.gateway.yaml up
#
# Paths are relative to the project directory (the base compose.yaml's dir =
# repo root), not this file's dir. Built from the pinned fork for now; pin to a
# digest per ADR-0008 before release.
volumes:
  # shared between the gateway (writes requests) and hako (the watcher + the
  # gmux prompt sessions write verdicts). ADR-0010.
  approvals:

services:
  gateway:
    build:
      context: https://github.com/mgabor3141/mcp-proxy.git#feat/call-hook
      dockerfile: Dockerfile.slim
    container_name: hako-gateway
    restart: unless-stopped
    volumes:
      - ./gateway/config.json:/config/config.json:ro
      - ./gateway/hooks:/hooks:ro
      - approvals:/tmp/approvals
    # Per-integration upstream URLs are literals in the generated config.json;
    # secrets (tokens) arrive from the vault (compose.vault.yaml). The agent
    # never sees either -- nothing integration-specific lives in this overlay.

  hako:
    # The agent reaches the gateway by service DNS on the private compose
    # network -- no host ports, no token (the private network is the boundary).
    # `hako assemble` wires each gateway integration's route into .hako.env.
    environment:
      # the entrypoint starts this hako-side approval watcher when present
      HAKO_APPROVAL_WATCH: /opt/hako/approvals/watch.sh
    volumes:
      - approvals:/tmp/approvals
      - ./gateway/approvals:/opt/hako/approvals:ro
    depends_on:
      - gateway
