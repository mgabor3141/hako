# Vault overlay (ADR-0011): the gateway boots SEALED. It gets no token from the
# environment; it must be unlocked with the passphrase. The host (`hako unlock`)
# age-decrypts vault/secrets.age in locked memory and pipes the env into a tmpfs
# the gateway sources. `hako up` does this for you; `hako unlock` re-does it
# after a gateway restart.
#
#   docker compose -f compose.yaml -f gateway/compose.gateway.yaml \
#     -f gateway/compose.vault.yaml up -d        # then: hako unlock
services:
  gateway:
    entrypoint: ["/seal/boot.sh"]
    command: ["--config", "/config/config.json"]
    # No secret env here: boot.sh blocks until `hako unlock` pipes the decrypted
    # secrets into the tmpfs below, sources them, then starts mcp-proxy. Generic
    # -- nothing integration-specific.
    volumes:
      - ./gateway/seal:/seal:ro
    tmpfs:
      # decrypted secrets live here only -- RAM, never the host disk
      - /run/hako
