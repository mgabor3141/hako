# hako integrations -- copy to hako.toml (gitignored) or run `hako configure`.
#
# Each directory under integrations/ can be enabled here. Disabled (or absent)
# integrations are invisible to the agent: no skill in pi's context, no gateway
# backend, no sidecar. Some integrations expose settings -- see their
# integration.toml for what they declare.

[integrations.github]
enabled = true

# Create/read/edit Word, Excel, and PowerPoint files with pure-Python libraries
# (installed on first use). Light, no credentials, no render engine.
[integrations.office]
enabled = true

# Where to look when the hako environment fails, and what the agent can fix vs
# must ask you about. Instructional only; no credentials.
[integrations.troubleshooting]
enabled = true

# Web search via a bundled SearXNG sidecar (or your own endpoint).
[integrations.websearch]
enabled = false
# sidecar = true                      # run the bundled SearXNG sidecar (default)
# url = "https://searx.example.com"   # use this endpoint instead (set sidecar = false)

# Read a page's main content as markdown, via a bundled crawl4ai sidecar.
# Off by default: crawl4ai is a heavy (headless Chromium) image.
[integrations.webview]
enabled = false
# sidecar = true                      # run the bundled crawl4ai sidecar (default)
# url = "https://crawl.example.com"   # use this endpoint instead (set sidecar = false)

# Periodic snapshots of the agent home into a repo it can't reach (restic).
# Off by default (ADR-0009); the agent gets no skill for this -- it's infra.
[integrations.backups]
enabled = false
# interval = 900                      # seconds between snapshots
