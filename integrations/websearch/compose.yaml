# Bundled search sidecar: a real SearXNG, reachable on hako's private network as
# `websearch:8080` (the skill's default endpoint). The limiter is off and JSON
# output is on (see searxng/settings.yml), so no valkey/rate-limiter is needed --
# this instance is never published. Included only when the integration's
# `sidecar` setting is true (integration.toml: [sidecar].enabled_by = "sidecar").
services:
  websearch:
    # tag + digest: readable channel, immutable bytes (ADR-0008). Renovate
    # keeps the digest fresh -- matters here, searxng tracks a moving `latest`.
    image: searxng/searxng:latest@sha256:ed29454ec1f7149986d42819b8b75265e545e79dd9187ba241c09f16a0fe56d0
    container_name: hako-websearch
    restart: unless-stopped
    volumes:
      - ./integrations/websearch/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
