# Test overlay: a github-shaped mock MCP server + repoint the gateway at it, so
# the gateway + callHook loop runs hermetically, with zero real credentials.
#
#   docker compose -f compose.yaml -f gateway/compose.gateway.yaml -f test/compose.mock.yaml up
#
# Set HAKO_APPROVE_ALL=1 in the environment to make the approve.sh "ask" branch
# approve (simulating an operator click) so writes succeed deterministically.
services:
  github-mock:
    build: ./test/github-mock
    container_name: hako-github-mock
    restart: unless-stopped

  gateway:
    environment:
      GITHUB_MCP_URL: http://github-mock:8080/mcp
      GITHUB_MCP_TOKEN: ""
      HAKO_APPROVE_ALL: ${HAKO_APPROVE_ALL:-0}
    depends_on:
      - github-mock
